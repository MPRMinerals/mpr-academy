<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MPR Copper Cathode Academy</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:Arial,sans-serif;background:#f5f5f0;min-height:100vh;padding:20px;}
.app{max-width:700px;margin:0 auto;background:#fff;border-radius:16px;overflow:hidden;box-shadow:0 2px 20px rgba(0,0,0,0.08);}
.mpr-logo{width:80px;height:80px;object-fit:contain;background:#000;border-radius:50%;padding:7px;display:block;margin:0 auto;}
.mpr-logo-sm{width:40px;height:40px;object-fit:contain;background:#000;border-radius:50%;padding:4px;flex-shrink:0;}
.mpr-wordmark{font-size:11px;font-weight:700;letter-spacing:0.14em;color:#B87333;text-align:center;margin-top:6px;text-transform:uppercase;}
.lang-screen{text-align:center;padding:2.5rem 2rem 2.5rem;background:#faf9f7;}
.lang-screen h1{font-size:24px;font-weight:700;color:#1a1a1a;margin:1rem 0 6px;}
.lang-screen p{font-size:13px;color:#666;margin-bottom:2rem;}
.lang-divider{width:44px;height:3px;background:#B87333;margin:12px auto 1.5rem;border-radius:2px;}
.lang-cards{display:flex;gap:20px;justify-content:center;flex-wrap:wrap;}
.lang-card{width:190px;padding:1.8rem 1rem;border-radius:14px;border:1.5px solid #e0ddd8;background:#fff;cursor:pointer;transition:all 0.18s;text-align:center;}
.lang-card:hover{border-color:#B87333;transform:translateY(-3px);box-shadow:0 6px 20px rgba(184,115,51,0.18);}
.lang-flag{font-size:48px;display:block;margin-bottom:12px;}
.lang-name{font-size:16px;font-weight:700;color:#1a1a1a;margin-bottom:4px;}
.lang-hint{font-size:12px;color:#888;}
.hero{display:flex;align-items:center;gap:14px;padding:1.1rem 1.4rem;background:#faf9f7;border-bottom:1px solid #ede9e3;}
.hero-text{flex:1;}
.hero h1{font-size:16px;font-weight:700;color:#1a1a1a;margin-bottom:2px;}
.hero p{font-size:12px;color:#999;}
.switch-lang{font-size:12px;color:#B87333;cursor:pointer;text-decoration:underline;margin-top:5px;display:inline-block;}
.progress-wrap{padding:1rem 1.4rem 0.2rem;}
.progress-bar-bg{background:#ede9e3;border-radius:99px;height:8px;overflow:hidden;}
.progress-bar-fill{height:100%;background:linear-gradient(90deg,#B87333,#1D9E75);border-radius:99px;transition:width 0.4s;}
.prog-label{font-size:12px;color:#aaa;margin-top:6px;margin-bottom:1rem;text-align:center;}
.module-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;padding:0 1.4rem 1.5rem;}
.mod-card{background:#faf9f7;border:1px solid #ede9e3;border-radius:12px;padding:1rem;cursor:pointer;transition:all 0.15s;position:relative;}
.mod-card:hover{border-color:#B87333;background:#fff;}
.mod-card.done{border-color:#1D9E75;background:#f0faf5;}
.mod-num{font-size:10px;font-weight:700;color:#bbb;margin-bottom:4px;letter-spacing:0.05em;text-transform:uppercase;}
.mod-title{font-size:14px;font-weight:700;color:#1a1a1a;margin-bottom:4px;}
.mod-sub{font-size:12px;color:#888;line-height:1.4;}
.mod-badge{position:absolute;top:10px;right:10px;font-size:10px;border-radius:99px;padding:2px 9px;font-weight:700;}
.badge-new{background:#e8f0fe;color:#1a73e8;}
.badge-done{background:#e6f4ea;color:#137333;}
.lesson-area{background:#fff;}
.lesson-topbar{display:flex;align-items:center;gap:12px;padding:1rem 1.4rem;background:#faf9f7;border-bottom:1px solid #ede9e3;}
.lesson-topbar-text{flex:1;}
.lesson-title-el{font-size:17px;font-weight:700;color:#1a1a1a;}
.lesson-subtitle-el{font-size:11px;color:#aaa;}
.lesson-body-wrap{padding:1.4rem;}
.lesson-body{font-size:14px;color:#222;line-height:1.8;}
.lesson-body h3{font-size:10px;font-weight:700;color:#aaa;margin:1.2rem 0 0.5rem;text-transform:uppercase;letter-spacing:0.07em;}
.info-row{display:flex;gap:8px;margin:1rem 0;flex-wrap:wrap;}
.info-pill{background:#faf9f7;border-radius:8px;padding:6px 12px;font-size:12px;display:flex;align-items:center;gap:7px;border:1px solid #ede9e3;}
.dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.flow-row{display:flex;align-items:center;gap:5px;margin:1.1rem 0;flex-wrap:wrap;}
.flow-box{background:#faf9f7;border:1px solid #ede9e3;border-radius:8px;padding:7px 12px;font-size:12px;font-weight:600;color:#333;}
.flow-arrow{color:#B87333;font-size:16px;font-weight:700;}
.flow-box.green{background:#e6f4ea;border-color:#a8d5b5;color:#137333;}
.flow-box.blue{background:#e8f0fe;border-color:#a8c4f5;color:#1a73e8;}
.key-fact{background:#e8f0fe;border-left:3px solid #4a90d9;border-radius:0 8px 8px 0;padding:10px 14px;font-size:13px;color:#1a5276;margin:1rem 0;line-height:1.6;}
.step-list{list-style:none;margin:1rem 0;}
.step-list li{display:flex;gap:10px;margin-bottom:10px;align-items:flex-start;font-size:13px;color:#333;}
.step-num{min-width:22px;height:22px;border-radius:50%;background:#B87333;color:#fff;font-size:11px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:1px;}
.glossary-row{display:flex;gap:10px;margin-bottom:10px;}
.gterm{font-weight:700;font-size:13px;min-width:130px;color:#333;}
.gdef{font-size:13px;color:#666;line-height:1.5;}
.quiz-section{margin-top:1.5rem;border-top:1px solid #ede9e3;padding-top:1.2rem;}
.quiz-q{font-size:14px;font-weight:700;color:#1a1a1a;margin-bottom:0.8rem;}
.quiz-opts{display:flex;flex-direction:column;gap:8px;}
.quiz-opt{padding:10px 14px;border-radius:8px;border:1px solid #ddd;background:#faf9f7;font-size:13px;cursor:pointer;transition:all 0.15s;text-align:left;color:#333;font-family:Arial,sans-serif;}
.quiz-opt:hover{border-color:#B87333;background:#fff;}
.quiz-opt.correct{background:#e6f4ea;border-color:#1D9E75;color:#137333;font-weight:700;}
.quiz-opt.wrong{background:#fce8e6;border-color:#d93025;color:#c62828;}
.quiz-feedback{margin-top:10px;font-size:13px;padding:10px 14px;border-radius:8px;display:none;line-height:1.6;}
.nav-row{display:flex;gap:10px;padding:1rem 1.4rem;justify-content:space-between;align-items:center;border-top:1px solid #ede9e3;background:#faf9f7;}
.nav-btn{padding:9px 22px;border-radius:8px;border:1px solid #ddd;background:#fff;font-size:13px;cursor:pointer;color:#333;transition:all 0.15s;font-family:Arial,sans-serif;}
.nav-btn:hover{border-color:#B87333;}
.nav-btn.primary{background:#B87333;border-color:#B87333;color:#fff;font-weight:700;}
.completion{text-align:center;padding:3rem 2rem;background:#faf9f7;}
.completion h2{font-size:24px;font-weight:700;color:#1a1a1a;margin:1rem 0 8px;}
.completion p{color:#666;font-size:14px;line-height:1.6;}
.cert-strip{margin:1.5rem auto 0;max-width:360px;border:2px solid #B87333;border-radius:12px;padding:1.2rem;background:#fff;}
.home-btn{margin-top:1.2rem;padding:11px 30px;border-radius:8px;background:#B87333;color:#fff;border:none;font-size:14px;font-weight:700;cursor:pointer;font-family:Arial,sans-serif;}
.modal-overlay{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.55);z-index:100;align-items:center;justify-content:center;}
.modal-overlay.show{display:flex;}
.modal{background:#fff;border-radius:16px;padding:2rem;max-width:400px;width:90%;text-align:center;}
.modal h3{font-size:18px;font-weight:700;color:#1a1a1a;margin-bottom:8px;}
.modal p{font-size:13px;color:#666;margin-bottom:1.2rem;line-height:1.6;}
.modal input{width:100%;padding:10px 14px;border:1px solid #ddd;border-radius:8px;font-size:14px;margin-bottom:10px;font-family:Arial,sans-serif;}
.modal-btn{width:100%;padding:11px;border-radius:8px;background:#B87333;color:#fff;border:none;font-size:14px;font-weight:700;cursor:pointer;font-family:Arial,sans-serif;}
.modal-skip{font-size:12px;color:#aaa;cursor:pointer;margin-top:10px;text-decoration:underline;display:block;}
@media(max-width:500px){.module-grid{grid-template-columns:1fr;}.lang-cards{flex-direction:column;align-items:center;}}
</style>
</head>

{title:"MPR Minerals in the DRC",subtitle:"Module 01 \u00b7 Company Overview",
body:'<div class="lesson-body"><p>MPR Minerals is a mining and metallurgical company operating in the <strong>Democratic Republic of Congo (DRC)</strong> \u2014 one of the world\'s most copper-rich countries, holding some of the largest copper reserves on the planet.</p><h3>What does MPR do?</h3><p>MPR procures copper-bearing ore from local mines and processes it at its hydrometallurgical plant using the SX-EW method to produce <strong>copper cathodes</strong> \u2014 the industry-standard form of refined copper traded globally.</p><div class="info-row"><div class="info-pill"><div class="dot" style="background:#B87333"></div>Commodity: Copper Cathode (Grade A)</div><div class="info-pill"><div class="dot" style="background:#1D9E75"></div>Location: DRC, Central Africa</div><div class="info-pill"><div class="dot" style="background:#378ADD"></div>Process: SX-EW Hydrometallurgy</div></div><h3>Why copper cathode?</h3><p>Copper cathodes are 99.99% pure copper plates used in electrical wiring, construction, electronics, and renewable energy. They are the reference product for the London Metal Exchange (LME).</p><div class="key-fact">\ud83d\udca1 The DRC produces roughly 10% of the world\'s copper. MPR operates across Dubai, DR. Congo and Zambia \u2014 transforming raw ore into a globally traded commodity.</div><h3>Key stakeholders</h3><div class="info-row"><div class="info-pill">\ud83c\udfd7\ufe0f Local mine operators</div><div class="info-pill">\ud83d\udd2c Plant technical teams</div><div class="info-pill">\ud83d\udea2 Export &amp; logistics partners</div><div class="info-pill">\ud83c\udfe6 Banks &amp; trade finance</div><div class="info-pill">\ud83c\udf0d International buyers</div></div></div>',
quiz:{q:"What is the end product that MPR Minerals produces?",opts:["Copper wire","Copper cathode (Grade A)","Copper ore","Copper powder"],ans:1,expl:"Copper cathodes \u2014 99.99% pure copper plates \u2014 are MPR's end product, refined from copper ore using the SX-EW process."}},
{title:"Copper Ore Procurement",subtitle:"Module 02 \u00b7 From Mine to Plant Gate",
body:'<div class="lesson-body"><p>Before any copper cathode can be produced, MPR must source the raw material: <strong>copper-bearing ore or concentrate</strong>. This is the foundation of the entire value chain.</p><h3>Where does the ore come from?</h3><p>In the DRC, copper ore is sourced from artisanal and semi-industrial mining operations (often called <em>n\u00e9gociants</em> or <em>comptoirs</em>). MPR works with local suppliers who bring ore to the plant gate.</p><div class="flow-row"><div class="flow-box">Mine / Pit</div><div class="flow-arrow">\u2192</div><div class="flow-box">Sorting &amp; weighing</div><div class="flow-arrow">\u2192</div><div class="flow-box">Quality sampling</div><div class="flow-arrow">\u2192</div><div class="flow-box">Transport to plant</div><div class="flow-arrow">\u2192</div><div class="flow-box">Plant stockpile</div></div><h3>Key quality parameters</h3><ul class="step-list"><li><div class="step-num">%</div><div><strong>Copper grade (%Cu)</strong> \u2014 percentage of copper in the ore. Typical DRC ore: 1.5%\u20134% Cu.</div></li><li><div class="step-num">H\u2082O</div><div><strong>Moisture content</strong> \u2014 deducted at weighing to determine Dry Metric Tonnes (DMT).</div></li><li><div class="step-num">Fe</div><div><strong>Penalty elements</strong> \u2014 iron, cobalt and other impurities affect the process and supplier price.</div></li></ul><div class="key-fact">\ud83d\udca1 If LME copper = $9,000/t and ore is 3% Cu \u2192 payable Cu per tonne \u2248 0.03 \u00d7 $9,000 \u00d7 payability % \u2212 TC/RC.</div></div>',
quiz:{q:"What does DMT stand for in ore weighing?",opts:["Daily Metal Trade","Dry Metric Tonne","Direct Mining Transfer","Dynamic Metal Test"],ans:1,expl:"DMT = Dry Metric Tonne. Moisture is deducted from the gross weight so the price reflects only the actual dry ore content."}},
{title:"The SX-EW Process",subtitle:"Module 03 \u00b7 Solvent Extraction \u2014 Electrowinning",
body:'<div class="lesson-body"><p>SX-EW stands for <strong>Solvent Extraction \u2014 Electrowinning</strong>. A hydrometallurgical process (liquids, not heat) that transforms copper ore directly into high-purity copper cathodes \u2014 without smelting.</p><h3>Step 1 \u2014 Leaching</h3><p>Crushed ore is placed on lined pads. Dilute <strong>sulfuric acid (H\u2082SO\u2084)</strong> dissolves copper from the rock, creating the <em>Pregnant Leach Solution (PLS)</em>.</p><div class="flow-row"><div class="flow-box">Crushed ore + H\u2082SO\u2084</div><div class="flow-arrow">\u2192</div><div class="flow-box">Pregnant Leach Solution (PLS)</div></div><h3>Step 2 \u2014 Solvent Extraction (SX)</h3><p>PLS is mixed with an organic solvent capturing copper ions, then stripped with fresh acid to produce a <strong>purified copper electrolyte</strong>. Impurities are rejected.</p><div class="flow-row"><div class="flow-box">PLS + organic solvent</div><div class="flow-arrow">\u2192</div><div class="flow-box">Extract Cu</div><div class="flow-arrow">\u2192</div><div class="flow-box">Strip \u2192 pure electrolyte</div></div><h3>Step 3 \u2014 Electrowinning (EW)</h3><p>Electric current deposits copper onto <strong>stainless steel blank cathodes</strong>. After 5\u20137 days: <strong>copper cathodes (99.99% Cu)</strong>.</p><div class="flow-row"><div class="flow-box">Electrolyte + current</div><div class="flow-arrow">\u2192</div><div class="flow-box">Cu deposits on cathode</div><div class="flow-arrow">\u2192</div><div class="flow-box green">Harvest: copper cathode \u2713</div></div><div class="key-fact">\ud83d\udca1 SX-EW emits no SO\u2082, uses less energy than smelting, and works on oxide ores that traditional furnace methods cannot process.</div></div>',
quiz:{q:"What does PLS stand for in the SX-EW process?",opts:["Pre-Loaded Solution","Pregnant Leach Solution","Pure Liquid Stock","Primary Leach Stage"],ans:1,expl:"PLS = Pregnant Leach Solution \u2014 the copper-rich liquid produced when sulfuric acid dissolves copper from the ore."}},
{title:"Incoterms: FCA Bonded Warehouse",subtitle:"Module 04 \u00b7 Delivery, Risk & Logistics",
body:'<div class="lesson-body"><p><strong>Incoterms\u00ae</strong> are ICC rules defining who bears cost and risk at each stage of an international sale. MPR sells on <strong>FCA \u2014 Free Carrier</strong> terms to a bonded warehouse.</p><h3>What is FCA?</h3><p>MPR delivers cathodes to the <strong>bonded warehouse</strong> and hands them to the buyer\'s carrier. Risk transfers to the buyer at that exact moment.</p><div class="flow-row"><div class="flow-box green">MPR Plant</div><div class="flow-arrow">\u2192</div><div class="flow-box blue">Bonded Warehouse \u2190 risk transfers here</div><div class="flow-arrow">\u2192</div><div class="flow-box">Buyer\'s carrier \u2192 world</div></div><h3>What is a bonded warehouse?</h3><p>A <strong>customs-supervised storage facility</strong> where goods are held without export duties until released. It enables:</p><ul class="step-list"><li><div class="step-num">1</div>Secure, neutral point for title transfer</li><li><div class="step-num">2</div>Third-party inspection and weighing (SGS, Bureau Veritas) before payment triggers</li><li><div class="step-num">3</div>Buyer flexibility to consolidate shipments before sea freight</li><li><div class="step-num">4</div>Full compliance with DRC export regulations</li></ul><div class="key-fact">\ud83d\udca1 Under FCA, MPR\'s responsibility ends at the bonded warehouse. All export costs, ocean freight, insurance and destination duties are the buyer\'s responsibility.</div></div>',
quiz:{q:"Under FCA, when does risk transfer from MPR to the buyer?",opts:["When cathodes leave the MPR plant","When cathodes are handed to the buyer's carrier at the bonded warehouse","When the vessel leaves the DRC port","When the buyer pays the LC"],ans:1,expl:"FCA: risk transfers the moment the seller delivers to the named place (bonded warehouse) and goods are in the hands of the buyer's designated carrier."}},
{title:"Trade Finance: LC at Sight",subtitle:"Module 05 \u00b7 Letters of Credit & Payment Security",
body:'<div class="lesson-body"><p>MPR uses <strong>Letters of Credit (LC) at Sight</strong> \u2014 a bank-guaranteed payment instrument \u2014 for every cathode shipment.</p><h3>What is a Letter of Credit?</h3><p>An irrevocable commitment by the <strong>buyer\'s bank</strong> to pay MPR a specified amount, provided the correct documents are presented within the agreed timeframe.</p><h3>What does "at Sight" mean?</h3><p>Payment released <em>immediately</em> upon presentation of compliant documents \u2014 typically within 5 business days. No deferred payment.</p><div class="flow-row"><div class="flow-box">Contract signed</div><div class="flow-arrow">\u2192</div><div class="flow-box">Buyer\'s bank issues LC</div><div class="flow-arrow">\u2192</div><div class="flow-box">MPR delivers to warehouse</div><div class="flow-arrow">\u2192</div><div class="flow-box">Documents presented</div><div class="flow-arrow">\u2192</div><div class="flow-box green">Payment released \u2713</div></div><h3>Documents MPR must present</h3><ul class="step-list"><li><div class="step-num">1</div>Commercial invoice \u2014 quantity, LME-linked unit price, total value</li><li><div class="step-num">2</div>Weight / Assay certificate \u2014 signed by SGS / Bureau Veritas</li><li><div class="step-num">3</div>Warehouse receipt \u2014 proof of FCA delivery</li><li><div class="step-num">4</div>Packing list \u2014 bundle count, plate count, net/gross weight</li><li><div class="step-num">5</div>Certificate of origin \u2014 confirms DRC origin</li></ul><div class="key-fact">\ud83d\udca1 The LC means MPR does NOT rely on the buyer\'s willingness to pay \u2014 the bank has already committed. Counterparty risk eliminated.</div><h3>Key glossary</h3><div class="glossary-row"><div class="gterm">Issuing bank</div><div class="gdef">Buyer\'s bank \u2014 creates and guarantees the LC</div></div><div class="glossary-row"><div class="gterm">Advising bank</div><div class="gdef">MPR\'s bank \u2014 receives and validates the LC</div></div><div class="glossary-row"><div class="gterm">Confirming bank</div><div class="gdef">Optional extra bank guarantee</div></div><div class="glossary-row"><div class="gterm">Compliant docs</div><div class="gdef">Documents matching LC terms exactly \u2014 discrepancy delays payment</div></div><div class="glossary-row"><div class="gterm">LME price</div><div class="gdef">London Metal Exchange copper price \u2014 basis for invoice</div></div></div>',
quiz:{q:"What is the key advantage of an LC at Sight for MPR as seller?",opts:["It allows payment in 90 days","The buyer's bank guarantees immediate payment on compliant documents","It removes the need for any shipping documents","It gives the buyer a price discount"],ans:1,expl:"With an LC at Sight, MPR receives payment immediately once compliant documents are presented \u2014 the bank guarantee eliminates counterparty risk."}}
]},

lessons:[
{title:"MPR Minerals en RDC",subtitle:"Module 01 \u00b7 Pr\u00e9sentation g\u00e9n\u00e9rale",
body:'<div class="lesson-body"><p>MPR Minerals est une soci\u00e9t\u00e9 mini\u00e8re et m\u00e9tallurgique op\u00e9rant en <strong>R\u00e9publique D\u00e9mocratique du Congo (RDC)</strong> \u2014 l\u2019un des pays les plus riches en cuivre au monde.</p><h3>Que fait MPR ?</h3><p>MPR ach\u00e8te du minerai cupri\u00e8re aupr\u00e8s de mines locales et le traite dans son usine hydrom\u00e9tallurgique par le proc\u00e9d\u00e9 SX-EW pour produire des <strong>cathodes de cuivre</strong> \u2014 la forme de r\u00e9f\u00e9rence du cuivre raffin\u00e9 \u00e9chang\u00e9 mondialement.</p><div class="info-row"><div class="info-pill"><div class="dot" style="background:#B87333"></div>Produit : Cathode cuivre (Grade A)</div><div class="info-pill"><div class="dot" style="background:#1D9E75"></div>Lieu : RDC, Afrique centrale</div><div class="info-pill"><div class="dot" style="background:#378ADD"></div>Proc\u00e9d\u00e9 : SX-EW Hydrom\u00e9tallurgie</div></div><h3>Pourquoi des cathodes ?</h3><p>Plaques \u00e0 99,99% de puret\u00e9 utilis\u00e9es dans le c\u00e2blage \u00e9lectrique, la construction, l\u2019\u00e9lectronique et les \u00e9nergies renouvelables. Produit de r\u00e9f\u00e9rence du LME.</p><div class="key-fact">\ud83d\udca1 La RDC produit environ 10% du cuivre mondial. MPR op\u00e8re entre Duba\u00ef, la RDC et la Zambie.</div><h3>Acteurs cl\u00e9s</h3><div class="info-row"><div class="info-pill">\ud83c\udfd7\ufe0f Exploitants miniers</div><div class="info-pill">\ud83d\udd2c \u00c9quipes techniques</div><div class="info-pill">\ud83d\udea2 Partenaires logistiques</div><div class="info-pill">\ud83c\udfe6 Banques</div><div class="info-pill">\ud83c\udf0d Acheteurs</div></div></div>',
quiz:{q:"Quel est le produit fini de MPR Minerals ?",opts:["Fil de cuivre","Cathode de cuivre (Grade A)","Minerai de cuivre","Poudre de cuivre"],ans:1,expl:"Les cathodes de cuivre \u2014 plaques \u00e0 99,99% de puret\u00e9 \u2014 sont le produit final de MPR."}},
{title:"Approvisionnement en minerai",subtitle:"Module 02 \u00b7 De la mine \u00e0 la porte de l\u2019usine",
body:'<div class="lesson-body"><p>Avant toute production de cathodes, MPR doit s\u2019approvisionner en <strong>minerai ou concentr\u00e9 cupri\u00e8re</strong> \u2014 le fondement de toute la cha\u00eene de valeur.</p><h3>D\u2019o\u00f9 vient le minerai ?</h3><p>En RDC, le minerai provient de mines artisanales et semi-industrielles (<em>n\u00e9gociants</em>, <em>comptoirs</em>).</p><div class="flow-row"><div class="flow-box">Mine / Fosse</div><div class="flow-arrow">\u2192</div><div class="flow-box">Tri &amp; pes\u00e9e</div><div class="flow-arrow">\u2192</div><div class="flow-box">\u00c9chantillonnage</div><div class="flow-arrow">\u2192</div><div class="flow-box">Transport usine</div><div class="flow-arrow">\u2192</div><div class="flow-box">Stockpile</div></div><h3>Param\u00e8tres qualit\u00e9 cl\u00e9s</h3><ul class="step-list"><li><div class="step-num">%</div><div><strong>Teneur en cuivre (%Cu)</strong> \u2014 Typique RDC : 1,5%\u20134% Cu.</div></li><li><div class="step-num">H\u2082O</div><div><strong>Humidit\u00e9</strong> \u2014 D\u00e9duite pour calculer les Tonnes M\u00e9triques S\u00e8ches (TMS).</div></li><li><div class="step-num">Fe</div><div><strong>\u00c9l\u00e9ments p\u00e9nalisants</strong> \u2014 Fer, cobalt et impuret\u00e9s affectent le proc\u00e9d\u00e9.</div></li></ul><div class="key-fact">\ud83d\udca1 Si cuivre LME = 9 000 $/t et minerai \u00e0 3% Cu \u2192 cuivre payable/tonne \u2248 0,03 \u00d7 9 000 $ \u00d7 % payabilit\u00e9 \u2212 TC/RC.</div></div>',
quiz:{q:"Que signifie TMS dans le pesage du minerai ?",opts:["Tonnage Minier Standard","Tonne M\u00e9trique S\u00e8che","Transport Minier Sp\u00e9cialis\u00e9","Test M\u00e9tallurgique Standard"],ans:1,expl:"TMS = Tonne M\u00e9trique S\u00e8che. L\u2019humidit\u00e9 est d\u00e9duite pour que le prix refl\u00e8te uniquement le minerai sec r\u00e9el."}},
{title:"Le proc\u00e9d\u00e9 SX-EW",subtitle:"Module 03 \u00b7 Extraction par solvant \u2014 \u00c9lectrolyse",
body:'<div class="lesson-body"><p>SX-EW signifie <strong>Extraction par Solvant \u2014 \u00c9lectroextraction</strong>. Proc\u00e9d\u00e9 hydrom\u00e9tallurgique transformant le minerai directement en cathodes de haute puret\u00e9 \u2014 sans fusion.</p><h3>\u00c9tape 1 \u2014 Lixiviation</h3><p>Le minerai est concass\u00e9. De l\u2019<strong>acide sulfurique dilul\u00e9 (H\u2082SO\u2084)</strong> dissout le cuivre de la roche, cr\u00e9ant la <em>PLS</em>.</p><div class="flow-row"><div class="flow-box">Minerai + H\u2082SO\u2084</div><div class="flow-arrow">\u2192</div><div class="flow-box">PLS (solution cuivr\u00e9e)</div></div><h3>\u00c9tape 2 \u2014 Extraction par solvant (SX)</h3><p>La PLS est m\u00e9lang\u00e9e \u00e0 un solvant organique captant les ions cuivre, puis stripp\u00e9e pour produire un <strong>\u00e9lectrolyte purifi\u00e9</strong>.</p><div class="flow-row"><div class="flow-box">PLS + solvant organique</div><div class="flow-arrow">\u2192</div><div class="flow-box">Extraction Cu</div><div class="flow-arrow">\u2192</div><div class="flow-box">\u00c9lectrolyte pur</div></div><h3>\u00c9tape 3 \u2014 \u00c9lectroextraction (EW)</h3><p>Un courant \u00e9lectrique d\u00e9pose le cuivre sur des <strong>cathodes blanches en inox</strong>. Apr\u00e8s 5\u20137 jours : <strong>cathodes de cuivre (99,99% Cu)</strong>.</p><div class="flow-row"><div class="flow-box">\u00c9lectrolyte + courant</div><div class="flow-arrow">\u2192</div><div class="flow-box">Cu se d\u00e9pose</div><div class="flow-arrow">\u2192</div><div class="flow-box green">R\u00e9colte : cathode \u2713</div></div><div class="key-fact">\ud83d\udca1 SX-EW : pas d\u2019\u00e9missions SO\u2082, moins d\u2019\u00e9nergie que la fusion, fonctionne sur des minerais oxyd\u00e9s inaccessibles aux m\u00e9thodes classiques.</div></div>',
quiz:{q:"Que signifie PLS dans le proc\u00e9d\u00e9 SX-EW ?",opts:["Pre-Loaded Solution","Pregnant Leach Solution","Pure Liquid Stock","Primary Leach Stage"],ans:1,expl:"PLS = Pregnant Leach Solution \u2014 le liquide riche en cuivre produit quand l\u2019acide sulfurique dissout le cuivre du minerai."}},
{title:"Incoterms : FCA Entrep\u00f4t sous douane",subtitle:"Module 04 \u00b7 Livraison, risque & logistique",
body:'<div class="lesson-body"><p>Les <strong>Incoterms\u00ae</strong> d\u00e9finissent qui supporte co\u00fbts et risques dans une vente internationale. MPR vend en <strong>FCA \u2014 Franco Transporteur</strong>.</p><h3>Qu\u2019est-ce que le FCA ?</h3><p>MPR livre les cathodes \u00e0 l\u2019<strong>entrep\u00f4t sous douane</strong> et les remet au transporteur de l\u2019acheteur. Le risque est transf\u00e9r\u00e9 \u00e0 ce moment pr\u00e9cis.</p><div class="flow-row"><div class="flow-box green">Usine MPR</div><div class="flow-arrow">\u2192</div><div class="flow-box blue">Entrep\u00f4t sous douane \u2190 transfert risque</div><div class="flow-arrow">\u2192</div><div class="flow-box">Transporteur acheteur</div></div><h3>Qu\u2019est-ce qu\u2019un entrep\u00f4t sous douane ?</h3><p><strong>Entrep\u00f4t supervis\u00e9 par les douanes</strong> o\u00f9 les marchandises sont stock\u00e9es sans droits jusqu\u2019\u00e0 l\u2019export.</p><ul class="step-list"><li><div class="step-num">1</div>Point neutre et s\u00e9curis\u00e9 pour le transfert de propri\u00e9t\u00e9</li><li><div class="step-num">2</div>Inspection et pesage par SGS / Bureau Veritas avant paiement</li><li><div class="step-num">3</div>Flexibilit\u00e9 pour l\u2019acheteur de consolider les exp\u00e9ditions</li><li><div class="step-num">4</div>Conformit\u00e9 aux r\u00e9glementations d\u2019export RDC</li></ul><div class="key-fact">\ud83d\udca1 En FCA, la responsabilit\u00e9 de MPR s\u2019arr\u00eate \u00e0 l\u2019entrep\u00f4t. Fret, assurance et droits \u00e0 destination sont \u00e0 la charge de l\u2019acheteur.</div></div>',
quiz:{q:"En FCA, quand le risque est-il transf\u00e9r\u00e9 de MPR \u00e0 l\u2019acheteur ?",opts:["Quand les cathodes quittent l\u2019usine","Quand les cathodes sont remises au transporteur \u00e0 l\u2019entrep\u00f4t sous douane","Quand le navire quitte le port","Quand l\u2019acheteur paie la LC"],ans:1,expl:"FCA : le risque est transf\u00e9r\u00e9 quand le vendeur livre au lieu convenu et que les marchandises sont entre les mains du transporteur de l\u2019acheteur."}},
{title:"Finance commerciale : LC \u00e0 vue",subtitle:"Module 05 \u00b7 Lettres de cr\u00e9dit & s\u00e9curit\u00e9 de paiement",
body:'<div class="lesson-body"><p>MPR utilise des <strong>Lettres de Cr\u00e9dit (LC) \u00e0 vue</strong> \u2014 garanties bancaires \u2014 pour chaque exp\u00e9dition de cathodes.</p><h3>Qu\u2019est-ce qu\u2019une LC ?</h3><p>Un engagement irr\u00e9vocable de la <strong>banque de l\u2019acheteur</strong> de payer MPR, \u00e0 condition que les documents corrects soient pr\u00e9sent\u00e9s dans les d\u00e9lais.</p><h3>Que signifie "\u00e0 vue" ?</h3><p>Paiement <em>imm\u00e9diat</em> apr\u00e8s pr\u00e9sentation des documents conformes \u2014 g\u00e9n\u00e9ralement sous 5 jours ouvrables.</p><div class="flow-row"><div class="flow-box">Contrat sign\u00e9</div><div class="flow-arrow">\u2192</div><div class="flow-box">LC \u00e9mise</div><div class="flow-arrow">\u2192</div><div class="flow-box">MPR livre</div><div class="flow-arrow">\u2192</div><div class="flow-box">Documents pr\u00e9sent\u00e9s</div><div class="flow-arrow">\u2192</div><div class="flow-box green">Paiement \u2713</div></div><h3>Documents que MPR pr\u00e9sente</h3><ul class="step-list"><li><div class="step-num">1</div>Facture commerciale \u2014 quantit\u00e9, prix LME, valeur totale</li><li><div class="step-num">2</div>Certificat de pesage / analyse \u2014 sign\u00e9 par SGS / Bureau Veritas</li><li><div class="step-num">3</div>R\u00e9c\u00e9piss\u00e9 d\u2019entrep\u00f4t \u2014 preuve de livraison FCA</li><li><div class="step-num">4</div>Liste de colisage \u2014 liasses, plaques, poids</li><li><div class="step-num">5</div>Certificat d\u2019origine \u2014 confirme l\u2019origine RDC</li></ul><div class="key-fact">\ud83d\udca1 La LC signifie que MPR ne d\u00e9pend PAS de la volont\u00e9 de paiement de l\u2019acheteur \u2014 la banque s\u2019est d\u00e9j\u00e0 engag\u00e9e.</div><h3>Glossaire</h3><div class="glossary-row"><div class="gterm">Banque \u00e9mettrice</div><div class="gdef">Banque de l\u2019acheteur \u2014 cr\u00e9e et garantit la LC</div></div><div class="glossary-row"><div class="gterm">Banque notificatrice</div><div class="gdef">Banque de MPR \u2014 re\u00e7oit et valide la LC</div></div><div class="glossary-row"><div class="gterm">Documents conformes</div><div class="gdef">Correspondent exactement aux termes LC</div></div><div class="glossary-row"><div class="gterm">Prix LME</div><div class="gdef">London Metal Exchange \u2014 base de calcul de la facture</div></div></div>',
quiz:{q:"Quel est l\u2019avantage principal d\u2019une LC \u00e0 vue pour MPR ?",opts:["Elle permet le paiement en 90 jours","La banque de l\u2019acheteur garantit le paiement imm\u00e9diat sur documents conformes","Elle supprime le besoin de documents","Elle accorde une remise \u00e0 l\u2019acheteur"],ans:1,expl:"Avec une LC \u00e0 vue, MPR est pay\u00e9 imm\u00e9diatement une fois les documents conformes pr\u00e9sent\u00e9s \u2014 la garantie bancaire \u00e9limine le risque de contrepartie."}}
]}};
var lang=null,currentMod=0,completed={},quizDone=false;
function setLang(l){lang=l;document.getElementById('langView').style.display='none';renderHome();document.getElementById('homeView').style.display='block';}
function switchLang(){lang=lang==='en'?'fr':'en';renderHome();}
function countDone(){var c=0;for(var k in completed){if(completed[k])c++;}return c;}
function renderHome(){
var t=T[lang];
document.getElementById('heroTitle').textContent=t.heroTitle;
document.getElementById('heroSub').textContent=t.heroSub;
document.getElementById('switchLangBtn').textContent=t.switchLang;
var done=countDone();
document.getElementById('progressLabel').textContent=t.progressLabel(done,t.modules.length);
document.getElementById('progressBar').style.width=(done/t.modules.length*100)+'%';
var h='';for(var i=0;i<t.modules.length;i++){var m=t.modules[i];var d=completed[i];
h+='<div class="mod-card'+(d?' done':'')+'" onclick="openModule('+i+')">';
h+='<div class="mod-num">Module '+m.num+'</div><div class="mod-title">'+m.title+'</div><div class="mod-sub">'+m.sub+'</div>';
h+=d?'<div class="mod-badge badge-done">\u2713 Done</div>':'<div class="mod-badge badge-new">'+(lang==='en'?'Start':'Commencer')+'</div>';
h+='</div>';}
document.getElementById('moduleGrid').innerHTML=h;}
function openModule(i){currentMod=i;quizDone=false;document.getElementById('homeView').style.display='none';document.getElementById('lessonView').style.display='block';renderLesson();}
function renderLesson(){
var t=T[lang];var l=t.lessons[currentMod];var q=l.quiz;var isLast=currentMod===t.modules.length-1;
document.getElementById('homeLabel').textContent=t.homeLabel;
document.getElementById('nextBtn').textContent=isLast?t.finishLabel:t.nextLabel;
document.getElementById('lessonTitle').textContent=l.title;
document.getElementById('lessonSubtitle').textContent=l.subtitle;
var opts='';for(var i=0;i<q.opts.length;i++){opts+='<button class="quiz-opt" onclick="checkQuiz('+i+')">'+q.opts[i]+'</button>';}
document.getElementById('lessonContent').innerHTML=l.body+'<div class="quiz-section"><div class="quiz-q">\ud83e\udde0 '+t.quizLabel+': '+q.q+'</div><div class="quiz-opts">'+opts+'</div><div class="quiz-feedback" id="quizFeedback"></div></div>';}
function checkQuiz(idx){if(quizDone)return;quizDone=true;
var t=T[lang];var q=t.lessons[currentMod].quiz;
var btns=document.querySelectorAll('.quiz-opt');
for(var i=0;i<btns.length;i++){if(i===q.ans)btns[i].classList.add('correct');else if(i===idx&&i!==q.ans)btns[i].classList.add('wrong');btns[i].style.pointerEvents='none';}
var fb=document.getElementById('quizFeedback');var ok=idx===q.ans;
fb.style.cssText='display:block;background:'+(ok?'#e6f4ea':'#fef9e7')+';color:'+(ok?'#137333':'#b06000')+';padding:10px 14px;border-radius:8px;';
fb.textContent=(ok?t.correctPfx:t.wrongPfx)+q.expl;completed[currentMod]=true;}
function nextModule(){var t=T[lang];completed[currentMod]=true;
if(currentMod===t.modules.length-1){
document.getElementById('lessonView').style.display='none';
document.getElementById('completeView').style.display='block';
document.getElementById('completeTitle').textContent=t.completeTitle;
document.getElementById('completeMsg').textContent=t.completeMsg;
document.getElementById('certMsg').textContent=t.certMsg;
var d=new Date();document.getElementById('certDateLine').textContent=d.toLocaleDateString(lang==='fr'?'fr-FR':'en-GB',{year:'numeric',month:'long',day:'numeric'});
document.getElementById('completeBtn').textContent=t.completeBtn;
document.getElementById('modalTitle').textContent=t.modalTitle;
document.getElementById('modalMsg').textContent=t.modalMsg;
document.getElementById('modalBtn').textContent=t.modalBtn;
document.getElementById('modalSkip').textContent=t.modalSkip;
renderHome();setTimeout(function(){document.getElementById('completionModal').classList.add('show');},900);
}else{currentMod++;quizDone=false;renderLesson();}}
function goHome(){document.getElementById('lessonView').style.display='none';document.getElementById('completeView').style.display='none';document.getElementById('homeView').style.display='block';renderHome();}
function submitCompletion(){var name=document.getElementById('modalName').value.trim();var email=document.getElementById('modalEmail').value.trim();
if(!name||!email){alert(lang==='fr'?'Veuillez remplir tous les champs.':'Please fill in all fields.');return;}
var url=GOOGLE_FORM_URL+'?'+FIELD_NAME+'='+encodeURIComponent(name)+'&'+FIELD_EMAIL+'='+encodeURIComponent(email)+'&'+FIELD_LANG+'='+encodeURIComponent(lang.toUpperCase())+'&'+FIELD_DATE+'='+encodeURIComponent(new Date().toISOString());
fetch(url,{method:'POST',mode:'no-cors'}).catch(function(){});
document.getElementById('completionModal').classList.remove('show');
document.getElementById('certDateLine').textContent+='\u00a0\u2014 '+name;
alert(lang==='fr'?'Merci '+name+' ! Votre compl\u00e9tion a \u00e9t\u00e9 enregistr\u00e9e.':'Thank you '+name+'! Your completion has been recorded.');}
function skipModal(){document.getElementById('completionModal').classList.remove('show');}
</script>
